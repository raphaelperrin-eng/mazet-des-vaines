name: Mise à jour des disponibilités

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6 heures
  workflow_dispatch:          # bouton "Run workflow" manuel
  push:
    branches: [main]
    paths-ignore:
      - 'availability.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-ical@0.20.1 --no-save
      - run: node scripts/build-availability.mjs
        env:
          ICAL_URLS: ${{ secrets.ICAL_URLS }}
      - name: Commit des disponibilités
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add availability.json
          git diff --staged --quiet || git commit -m "Mise à jour automatique des disponibilités [skip ci]"
          git push
